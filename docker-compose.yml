services:
  postgres:
    image: postgres:16-alpine
    container_name: pxbr-breed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pxbr_breed
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pxbr_breed_postgres_data:/var/lib/postgresql/data

volumes:
  pxbr_breed_postgres_data:
